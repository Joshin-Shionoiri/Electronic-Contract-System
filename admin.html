<body>

</div>

<div class="card">
    <button onclick="logout()">ログアウト</button>
</div>

<script>

    location.href = "admin-login.html";
}

function logout() {
    sessionStorage.removeItem("adminUser");
    location.href = "admin-login.html";
}
</script>
