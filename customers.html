<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>顧客管理</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1e293b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background: #f1f5f9;
        }
    </style>
</head>
<body>

<!-- 共通ヘッダー -->
<div id="common-header"></div>
<script>
fetch("common-header.html").then(r=>r.text()).then(h=>document.getElementById("common-header").innerHTML=h);
</script>

<h2>顧客管理</h2>

<!-- 顧客登録フォーム -->
<div class="card">
    <div class="section-title">① 顧客登録</div>

    <label>顧客コード（CU-000123）</label>
    <input id="customerCode">

    <label>氏名</label>
    <input id="customerName">

    <label>生年月日</label>
    <input type="date" id="customerBirth">

    <label>電話番号</label>
    <input id="customerTel">

    <label>メールアドレス</label>
    <input id="customerMail">

    <label>住所</label>
    <input id="customerAddress">

    <button onclick="registerCustomer()">登録する</button>
    <div id="errorArea" class="error"></div>
</div>

<!-- 顧客一覧 -->
<div class="card">
    <div class="section-title">② 顧客一覧</div>
    <table id="customerTable">
        <thead>
            <tr>
                <th>顧客コード</th>
                <th>氏名</th>
                <th>生年月日</th>
                <th>電話番号</th>
                <th>メール</th>
                <th>住所</th>
                <th>バーコード</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="common.js"></script>
<script>
// ここにロジックを追加する
</script>

</body>
</html>
