<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>顧客管理</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        input, button { padding: 6px; margin: 4px 0; }
    </style>
</head>
<body>

<h2>顧客管理</h2>

<h3>顧客登録</h3>

<label>顧客名：</label><br>
<input id="customerName"><br>

<label>業種名（入力するとコード自動発行）：</label><br>
<input id="industryName"><br>

<button onclick="registerCustomer()">登録</button>

<h3>顧客一覧</h3>
<table id="customersTable">
    <tr>
        <th>顧客名</th>
        <th>業種コード</th>
        <th>業種名</th>
    </tr>
</table>

<script>
// ------------------------------
// 業種マスタ（localStorage）
// ------------------------------
let industryMaster = JSON.parse(localStorage.getItem("industryMaster") || "[]");

// 業種名 → コード自動発行
function registerIndustry(name) {
    if (!name) return "";

    // 既存チェック
    const exists = industryMaster.find(i => i.name === name);
    if (exists) return exists.code;

    // 新規コード発行（3桁連番）
    const newCode = String(industryMaster.length + 1).padStart(3, "0");

    industryMaster.push({
        code: newCode,
        name: name
    });

    localStorage.setItem("industryMaster", JSON.stringify(industryMaster));

    return newCode;
}

// ------------------------------
// 顧客データ
// ------------------------------
let customers = JSON.parse(localStorage.getItem("customers") || "[]");

// 顧客登録
function registerCustomer() {
    const name = document.getElementById("customerName").value.trim();
    const industryName = document.getElementById("industryName").value.trim();

    if (!name || !industryName) {
        alert("顧客名と業種名を入力してください。");
        return;
    }

    // 業種コードを自動発行
    const industryCode = registerIndustry(industryName);

    customers.push({
        customerName: name,
        industryCode: industryCode,
        industryName: industryName
    });

    localStorage.setItem("customers", JSON.stringify(customers));

    document.getElementById("customerName").value = "";
    document.getElementById("industryName").value = "";

    renderTable();
}

// ------------------------------
// 顧客一覧表示
// ------------------------------
function renderTable() {
    const table = document.getElementById("customersTable");

    table.innerHTML = `
        <tr>
            <th>顧客名</th>
            <th>業種コード</th>
            <th>業種名</th>
        </tr>
    `;

    customers.forEach(c => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${c.customerName}</td>
            <td>${c.industryCode}</td>
            <td>${c.industryName}</td>
        `;
        table.appendChild(row);
    });
}

renderTable();
</script>

</body>
</html>
