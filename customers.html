<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>顧客管理</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f8ff;
            padding: 20px;
        }
        h2 {
            color: #0078D4;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            background: #0078D4;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #005fa3;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }
    </style>
</head>
<body>

<h2>顧客管理</h2>

<div class="card">
    <label>顧客名：</label>
    <input id="customerName">

    <button onclick="registerCustomer()">登録</button>
</div>

<h3>顧客一覧</h3>
<table id="customersTable">
    <tr>
        <th>顧客コード</th>
        <th>顧客名</th>
        <th>ログインパスワード</th>
    </tr>
</table>

<script>
// 顧客データ
let customers = JSON.parse(localStorage.getItem("customers") || "[]");

// 顧客コード自動生成
function generateCustomerCode() {
    const letters = Array.from({length: 3}, () =>
        String.fromCharCode(65 + Math.floor(Math.random() * 26))
    ).join("");

    const numbers = String(Math.floor(Math.random() * 99999) + 1).padStart(5, "0");

    return `${letters}-${numbers}`;
}

// パスワード自動生成
function generatePassword() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let pass = "";
    for (let i = 0; i < 10; i++) {
        pass += chars[Math.floor(Math.random() * chars.length)];
    }
    return pass;
}

// 顧客登録
function registerCustomer() {
    const name = document.getElementById("customerName").value.trim();
    if (!name) {
        alert("顧客名を入力してください。");
        return;
    }

    const code = generateCustomerCode();
    const pass = generatePassword();

    customers.push({
        customerCode: code,
        customerName: name,
        password: pass
    });

    localStorage.setItem("customers", JSON.stringify(customers));

    document.getElementById("customerName").value = "";

    renderTable();
}

// 顧客一覧表示
function renderTable() {
    const table = document.getElementById("customersTable");

    table.innerHTML = `
        <tr>
            <th>顧客コード</th>
            <th>顧客名</th>
            <th>ログインパスワード</th>
        </tr>
    `;

    customers.forEach(c => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${c.customerCode}</td>
            <td>${c.customerName}</td>
            <td>${c.password}</td>
        `;
        table.appendChild(row);
    });
}

renderTable();
</script>

</body>
</html>
