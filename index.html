<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理メニュー</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f4f6fb;
            padding: 40px;
            color: #333;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #1e293b;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
        }

        .menu-card {
            background: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.12);
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
        }

        .menu-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .menu-desc {
            font-size: 13px;
            color: #64748b;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="topbar">
    <div class="user-menu" onclick="toggleUserMenu()">
        <span id="userNameDisplay"></span> ▼
    </div>

    <div class="user-dropdown" id="userDropdown">
        <div onclick="location.href='mypage.html'">マイページ</div>
        <div onclick="logout()">ログアウト</div>
    </div>
</div>


<h1>管理メニュー</h1>

<div class="menu-grid">

    <div class="menu-card" onclick="location.href='customers.html'">
        <div class="menu-icon">👥</div>
        <div class="menu-title">顧客管理</div>
        <div class="menu-desc">顧客登録・一覧・コード自動生成</div>
    </div>

    <div class="menu-card" onclick="location.href='employees.html'">
        <div class="menu-icon">🧑‍💼</div>
        <div class="menu-title">社員管理</div>
        <div class="menu-desc">社員登録・一覧・パスワード自動生成</div>
    </div>

    <div class="menu-card" onclick="location.href='contracts.html'">
        <div class="menu-icon">📄</div>
        <div class="menu-title">契約管理</div>
        <div class="menu-desc">契約締結フロー・PDF保存/閲覧/印刷</div>
    </div>

    <div class="menu-card" onclick="location.href='barcode.html'">
        <div class="menu-icon">🔖</div>
        <div class="menu-title">バーコード作成</div>
        <div class="menu-desc">顧客コードからバーコード生成</div>
    </div>

</div>

<div class="footer">
    © 上伸塾
</div>

</body>
</html>
