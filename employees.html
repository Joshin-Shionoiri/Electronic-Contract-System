<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>契約登録（社員用）</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1e293b;
        }
    </style>
</head>
<body>

<!-- 共通ヘッダー -->
<div id="common-header"></div>
<script>
fetch("common-header.html").then(r=>r.text()).then(h=>document.getElementById("common-header").innerHTML=h);
</script>

<h2>契約登録（社員用）</h2>

<div class="card">
    <div class="section-title">① 顧客選択</div>
    <label>顧客</label>
    <select id="customerSelect"></select>
    <button onclick="scanCustomerBarcode()">顧客バーコードを読み取る</button>
</div>

<div class="card">
    <div class="section-title">② 契約書番号</div>
    <label>契約書番号（CN-YYYYMMDD-XXXX）</label>
    <input id="contractNumber" placeholder="例：CN-20260320-0001">
    <button onclick="scanContractQR()">QRコードを読み取る</button>
</div>

<div class="card">
    <div class="section-title">③ 契約内容</div>
    <label>契約名</label>
    <input id="contractName">

    <label>契約開始日</label>
    <input type="date" id="startDate">

    <label>契約終了日</label>
    <input type="date" id="endDate">

    <label>金額</label>
    <input type="number" id="price">
</div>

<div class="card">
    <div class="section-title">④ 署名方式</div>
    <select id="signatureType">
        <option value="click">クリック署名</option>
        <option value="input">入力署名</option>
        <option value="handwrite">手書き署名（将来）</option>
    </select>
</div>

<div class="card">
    <div class="section-title">⑤ 契約書PDFアップロード</div>
    <input type="file" id="pdfFile" accept="application/pdf">
</div>

<div class="card">
    <button onclick="registerContract()">契約を登録する</button>
    <div id="errorArea" class="error"></div>
</div>

<script src="common.js"></script>
<script>
// ===============================
// 顧客リスト読み込み
// ===============================
window.onload = async function() {
    const customers = await loadCustomers();
    const select = document.getElementById("customerSelect");

    customers.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.customerCode;
        opt.textContent = `${c.customerCode}：${c.name}`;
        select.appendChild(opt);
    });
};

// IndexedDB から顧客一覧を取得
function loadCustomers() {
    return new Promise((resolve) => {
        const request = indexedDB.open("customersDB", 1);

        request.onsuccess = function(event) {
            const db = event.target.result;
            const tx = db.transaction("customers", "readonly");
            const store = tx.objectStore("customers");

            const customers = [];
            store.openCursor().onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    customers.push(cursor.value);
                    cursor.continue();
                } else {
                    resolve(customers);
                }
            };
        };
    });
}

// ===============================
// 顧客バーコード読み取り（対面契約）
// ===============================
function scanCustomerBarcode() {
    alert("ここで顧客番号バーコードを読み取る処理を実装（QuaggaJSなど）");

    // ★ デモ用
    const scanned = "CU-000123";

    const select = document.getElementById("customerSelect");
    select.value = scanned;
}

// ===============================
// 契約書番号のQR読み取り
// ===============================
function scanContractQR() {
    alert("ここで契約書QRコードを読み取る処理を実装（QRライブラリなど）");

    // ★ デモ用
    const scanned = "CN-20260320-0001";
    document.getElementById("contractNumber").value = scanned;
}

// ===============================
// 契約書番号フォーマットチェック
// ===============================
function validateContractNumber(num) {
    const pattern = /^CN-\d{8}-\d{4}(_\d+)?$/;
    return pattern.test(num);
}

// ===============================
// PDF を ArrayBuffer に変換
// ===============================
function fileToArrayBuffer(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsArrayBuffer(file);
    });
}

// ===============================
// 契約登録処理
// ===============================
async function registerContract() {
    const customerCode = document.getElementById("customerSelect").value;
    const contractNumber = document.getElementById("contractNumber").value.trim();
    const contractName = document.getElementById("contractName").value.trim();
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;
    const price = document.getElementById("price").value;
    const signatureType = document.getElementById("signatureType").value;
    const pdfFile = document.getElementById("pdfFile").files[0];

    const error = document.getElementById("errorArea");
    error.textContent = "";

    // 入力チェック
    if (!validateContractNumber(contractNumber)) {
        error.textContent = "契約書番号の形式が正しくありません。";
        return;
    }
    if (!contractName || !startDate || !endDate || !price) {
        error.textContent = "契約内容をすべて入力してください。";
        return;
    }
    if (!pdfFile) {
        error.textContent = "契約書PDFをアップロードしてください。";
        return;
    }

    // PDF を ArrayBuffer に変換
    const pdfData = await fileToArrayBuffer(pdfFile);

    // IndexedDB に保存
    const request = indexedDB.open("contractsDB", 1);

    request.onsuccess = function(event) {
        const db = event.target.result;
        const tx = db.transaction("contracts", "readwrite");
        const store = tx.objectStore("contracts");

        const contractData = {
            contractNumber,
            customerCode,
            contractName,
            startDate,
            endDate,
            price,
            signatureType,
            pdfData,
            signature: null,
            signedAt: null
        };

        store.put(contractData);

        tx.oncomplete = function() {
            alert("契約を登録しました。顧客が署名できる状態になりました。");
        };
    };
}

</script>

</body>
</html>
