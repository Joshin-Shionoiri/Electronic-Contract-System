<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>バーコード生成</title>

    <!-- Code128 ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        body { font-family: sans-serif; padding: 20px; }
        select, button { padding: 8px; margin: 5px 0; }
        #barcode { margin-top: 20px; }
    </style>
</head>
<body>

<h2>バーコード生成（Code128）</h2>

<select id="customerSelect">
    <option value="">顧客を選択</option>
</select>
<br>

<button onclick="generateBarcode()">バーコード生成</button>

<h3>バーコード</h3>
<svg id="barcode"></svg>

<br>
<button onclick="downloadPNG()">PNGとして保存</button>
<button onclick="downloadCSV()">CSVとして保存</button>

<script>
// ------------------------------
// 顧客データ読み込み
// ------------------------------
let customers = JSON.parse(localStorage.getItem("customers") || "[]");

// ------------------------------
// 顧客プルダウンに追加
// ------------------------------
window.onload = function() {
    const select = document.getElementById("customerSelect");

    customers.forEach((c, index) => {
        const opt = document.createElement("option");
        opt.value = index;
        opt.textContent = `${c.name}（${c.customerCode}）`;
        select.appendChild(opt);
    });
};

// ------------------------------
// バーコード生成
// ------------------------------
let currentBarcodeValue = "";

function generateBarcode() {
    const index = document.getElementById("customerSelect").value;

    if (index === "") {
        alert("顧客を選択してください。");
        return;
    }

    const c = customers[index];

    // 顧客コード_契約No.
    currentBarcodeValue = `${c.customerCode}_${c.contractNo}`;

    JsBarcode("#barcode", currentBarcodeValue, {
        format: "code128",
        width: 2,
        height: 60,
        displayValue: true
    });
}

// ------------------------------
// PNG ダウンロード
// ------------------------------
function downloadPNG() {
    if (!currentBarcodeValue) {
        alert("先にバーコードを生成してください。");
        return;
    }

    const svg = document.getElementById("barcode");
    const svgData = new XMLSerializer().serializeToString(svg);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const img = new Image();
    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const png = canvas.toDataURL("image/png");

        const link = document.createElement("a");
        link.href = png;
        link.download = currentBarcodeValue + ".png";
        link.click();
    };

    img.src = "data:image/svg+xml;base64," + btoa(svgData);
}

// ------------------------------
// CSV ダウンロード
// ------------------------------
function downloadCSV() {
    if (!currentBarcodeValue) {
        alert("先にバーコードを生成してください。");
        return;
    }

    const index = document.getElementById("customerSelect").value;
    const c = customers[index];

    const csv = `customer_code,contract_no,barcode_value\n${c.customerCode},${c.contractNo},${currentBarcodeValue}`;

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "barcode.csv";
    a.click();

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
