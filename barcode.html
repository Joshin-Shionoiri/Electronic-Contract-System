<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>バーコード生成</title>
    <link rel="stylesheet" href="common.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <style>
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .barcode-box {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- 共通ヘッダー -->
<div id="common-header"></div>
<script>
fetch("common-header.html").then(r=>r.text()).then(h=>document.getElementById("common-header").innerHTML=h);
</script>

<h2>バーコード生成</h2>

<!-- 顧客番号バーコード -->
<div class="card">
    <div class="section-title">① 顧客番号バーコード（Code128）</div>

    <label>顧客番号（CU-000123）</label>
    <input id="customerCode" placeholder="CU-000123">

    <button onclick="generateCustomerBarcode()">生成</button>

    <div id="customerBarcodeArea" class="barcode-box"></div>
</div>

<!-- 契約書番号QRコード -->
<div class="card">
    <div class="section-title">② 契約書番号QRコード</div>

    <label>契約書番号（CN-YYYYMMDD-XXXX）</label>
    <input id="contractNumber" placeholder="CN-20260320-0001">

    <button onclick="generateContractQR()">生成</button>

    <div id="contractQRArea" class="barcode-box"></div>
</div>

<script>
// ===============================
// 顧客番号バーコード生成（Code128）
// ===============================
function generateCustomerBarcode() {
    const code = document.getElementById("customerCode").value.trim();
    const area = document.getElementById("customerBarcodeArea");

    area.innerHTML = ""; // 初期化

    if (!/^CU-\d{6}$/.test(code)) {
        area.innerHTML = "<p style='color:red'>顧客番号の形式が正しくありません。</p>";
        return;
    }

    const svg = document.createElement("svg");
    area.appendChild(svg);

    JsBarcode(svg, code, {
        format: "CODE128",
        width: 2,
        height: 50,
        displayValue: true
    });
}

// ===============================
// 契約書番号QRコード生成
// ===============================
function generateContractQR() {
    const num = document.getElementById("contractNumber").value.trim();
    const area = document.getElementById("contractQRArea");

    area.innerHTML = ""; // 初期化

    if (!/^CN-\d{8}-\d{4}(_\d+)?$/.test(num)) {
        area.innerHTML = "<p style='color:red'>契約書番号の形式が正しくありません。</p>";
        return;
    }

    const canvas = document.createElement("canvas");
    area.appendChild(canvas);

    QRCode.toCanvas(canvas, num, { width: 200 }, function (error) {
        if (error) console.error(error);
    });
}
</script>

</body>
</html>
