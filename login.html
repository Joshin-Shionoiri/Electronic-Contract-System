<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .login-wrap {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            width: 380px;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 8px 28px rgba(15, 23, 42, 0.18);
            text-align: center;
        }
        .error {
            color: #b91c1c;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-card">
        <h2>ログイン</h2>

        <label>ユーザー種別</label>
        <select id="userType">
            <option value="employee">社員（社員証バーコード可）</option>
            <option value="customer">顧客（情報通知書）</option>
        </select>

        <label>ユーザーID</label>
        <input id="userID" placeholder="社員コード または 顧客コード">

        <label>パスワード</label>
        <input id="password" type="password" placeholder="パスワード">

        <button onclick="login()">ログイン</button>
        <button onclick="startBarcodeLogin()">社員証バーコードでログイン</button>

        <div id="error" class="error"></div>

        <div class="footer">© JOSHIN SYSTEMS</div>
    </div>
</div>

<script src="common.js"></script>
<script>
// 通常ログイン
function login() {
    const type = document.getElementById("userType").value;
    const id = document.getElementById("userID").value.trim();
    const pass = document.getElementById("password").value.trim();
    const error = document.getElementById("error");

    if (!id || !pass) {
        error.textContent = "ID と パスワードを入力してください。";
        return;
    }

    if (type === "employee") {
        const employees = JSON.parse(localStorage.getItem("employees") || "[]");
        const user = employees.find(e => e.employeeCode === id && e.password === pass);
        if (user) {
            localStorage.setItem("loginUser", JSON.stringify({
                type: "employee",
                code: user.employeeCode,
                name: user.employeeName
            }));
            location.href = "index.html";
            return;
        }
    }

    if (type === "customer") {
        const customers = JSON.parse(localStorage.getItem("customers") || "[]");
        const user = customers.find(c => c.customerCode === id && c.password === pass);
        if (user) {
            localStorage.setItem("loginUser", JSON.stringify({
                type: "customer",
                code: user.customerCode,
                name: user.customerName
            }));
            location.href = "index.html";
            return;
        }
    }

    error.textContent = "ID または パスワードが正しくありません。";
}

// 社員証バーコードログイン（ライブラリは別途）
function startBarcodeLogin() {
    alert("カメラを起動して社員証バーコードを読み取る処理をここに実装（QuaggaJS 等）");
    // 読み取ったコードを仮に EMP-000123 とする
    // loginWithBarcodeEmployee("EMP-000123");
}
</script>
</body>
</html>
