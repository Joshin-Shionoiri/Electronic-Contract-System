<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-card {
            background: white;
            width: 380px;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 8px 28px rgba(15, 23, 42, 0.18);
            text-align: center;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 16px;
            font-weight: 600;
            color: #334155;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: 2px solid #6366f1;
            border-color: #6366f1;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 24px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #4f46e5;
        }

        .error {
            color: #b91c1c;
            margin-top: 10px;
            font-size: 13px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>ログイン</h2>

    <label>ユーザー種別</label>
    <select id="userType">
        <option value="employee">社員ログイン</option>
        <option value="customer">顧客ログイン</option>
    </select>

    <label>ユーザーID</label>
    <input id="userID" placeholder="社員コード または 顧客コード">

    <label>パスワード</label>
    <input id="password" type="password" placeholder="パスワード">

    <button onclick="login()">ログイン</button>

    <div id="error" class="error"></div>

    <div class="footer">© JOSHIN SYSTEMS</div>
</div>

<script>
// ログイン処理
function login() {
    const type = document.getElementById("userType").value;
    const id = document.getElementById("userID").value.trim();
    const pass = document.getElementById("password").value.trim();
    const error = document.getElementById("error");

    if (!id || !pass) {
        error.textContent = "ID と パスワードを入力してください。";
        return;
    }

    if (type === "employee") {
        const employees = JSON.parse(localStorage.getItem("employees") || "[]");
        const user = employees.find(e => e.employeeCode === id && e.password === pass);

        if (user) {
            location.href = "index.html";
            return;
        }
    }

    if (type === "customer") {
        const customers = JSON.parse(localStorage.getItem("customers") || "[]");
        const user = customers.find(c => c.customerCode === id && c.password === pass);

        if (user) {
            location.href = "index.html";
            return;
        }
    }

    error.textContent = "ID または パスワードが正しくありません。";
}
</script>

</body>
</html>
