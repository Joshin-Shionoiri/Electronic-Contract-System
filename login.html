<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" href="common.css">

    <!-- バーコード読み取り用 QuaggaJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

    <style>
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>ログイン</h2>

<div class="card">
    <div class="section-title">① 顧客 / 社員ログイン</div>

    <label>ログインID（CU-000123 / EM-0001）</label>
    <div style="display:flex; gap:10px; align-items:center;">
        <input id="loginCode" style="flex:1;">
        <button onclick="scanBarcode()">バーコードを読み取る</button>
    </div>

    <label>パスワード</label>
    <input id="loginPass" type="password">

    <button onclick="login()">ログイン</button>
    <div id="errorArea" class="error"></div>
</div>

<div class="card">
    <div class="section-title">② 管理者ログイン</div>
    <button onclick="location.href='admin-login.html'">管理者ログインへ</button>
</div>

<!-- バーコード読み取りモーダル -->
<div id="scannerModal" style="
    display:none;
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    z-index:9999;
    justify-content:center;
    align-items:center;
">
    <div style="background:white; padding:20px; text-align:center;">
        <h3>バーコードを読み取っています…</h3>
        <div id="scanner" style="width:300px; height:200px;"></div>
        <button onclick="stopScanner()">閉じる</button>
    </div>
</div>

<script>
// ===============================
// バーコード読み取り（顧客・社員共通）
// ===============================
function scanBarcode() {
    document.getElementById("scannerModal").style.display = "flex";

    Quagga.init({
        inputStream: {
            type: "LiveStream",
            target: document.querySelector('#scanner'),
            constraints: { facingMode: "environment" }
        },
        decoder: { readers: ["code_128_reader"] }
    }, function(err) {
        if (err) {
            alert("カメラを起動できませんでした：" + err);
            return;
        }
        Quagga.start();
    });

    Quagga.onDetected(function(result) {
        const code = result.codeResult.code;

        stopScanner();

        // ★ 読み取ったコードを自動入力
        document.getElementById("loginCode").value = code;
    });
}

function stopScanner() {
    Quagga.stop();
    document.getElementById("scannerModal").style.display = "none";
}


// ===============================
// ログイン処理（顧客 / 社員）
// ===============================
function login() {
    const code = document.getElementById("loginCode").value.trim();
    const pass = document.getElementById("loginPass").value.trim();
    const error = document.getElementById("errorArea");
    error.textContent = "";

    if (!code) {
        error.textContent = "ログインIDを入力してください。";
        return;
    }

    // 顧客ログイン
    if (code.startsWith("CU-")) {
        loginCustomer(code, pass);
        return;
    }

    // 社員ログイン
    if (code.startsWith("EM-")) {
        loginEmployee(code, pass);
        return;
    }

    error.textContent = "ログインIDの形式が正しくありません。";
}


// ===============================
// 顧客ログイン
// ===============================
function loginCustomer(code, pass) {
    const request = indexedDB.open("customersDB", 1);

    request.onsuccess = function(e) {
        const db = e.target.result;
        const tx = db.transaction("customers", "readonly");
        const store = tx.objectStore("customers");

        const getReq = store.get(code);
        getReq.onsuccess = function() {
            const customer = getReq.result;

            if (!customer) {
                document.getElementById("errorArea").textContent = "顧客が見つかりません。";
                return;
            }

            // パスワードチェック（必要なら）
            if (customer.password && customer.password !== pass) {
                document.getElementById("errorArea").textContent = "パスワードが違います。";
                return;
            }

            sessionStorage.setItem("customerUser", JSON.stringify(customer));
            location.href = "customer-mypage.html";
        };
    };
}


// ===============================
// 社員ログイン
// ===============================
function loginEmployee(code, pass) {
    const request = indexedDB.open("employeeDB", 1);

    request.onsuccess = function(e) {
        const db = e.target.result;
        const tx = db.transaction("employees", "readonly");
        const store = tx.objectStore("employees");

        const getReq = store.get(code);
        getReq.onsuccess = function() {
            const emp = getReq.result;

            if (!emp) {
                document.getElementById("errorArea").textContent = "社員が見つかりません。";
                return;
            }

            if (emp.password !== pass) {
                document.getElementById("errorArea").textContent = "パスワードが違います。";
                return;
            }

            sessionStorage.setItem("employeeUser", JSON.stringify(emp));
            location.href = "employees.html";
        };
    };
}
</script>

</body>
</html>
