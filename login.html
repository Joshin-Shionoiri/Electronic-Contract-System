<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .tab {
            display: flex;
            margin-bottom: 20px;
        }
        .tab button {
            flex: 1;
            padding: 10px;
            border: none;
            background: #e2e8f0;
            cursor: pointer;
            font-weight: bold;
        }
        .tab button.active {
            background: #4f46e5;
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>

<h2>ログイン</h2>

<div class="tab">
    <button id="tabCustomer" class="active" onclick="switchTab('customer')">顧客ログイン</button>
    <button id="tabEmployee" onclick="switchTab('employee')">社員ログイン</button>
</div>

<!-- 顧客ログイン -->
<div id="panelCustomer" class="panel active card">
    <h3>顧客ログイン</h3>

    <label>顧客コード（CU-000123）</label>
    <input id="customerCode">

    <label>生年月日</label>
    <input type="date" id="customerBirth">

    <button onclick="loginCustomer()">ログイン</button>
    <div id="errorCustomer" class="error"></div>
</div>

<!-- 社員ログイン -->
<div id="panelEmployee" class="panel card">
    <h3>社員ログイン</h3>

    <label>社員コード（EM-000123）</label>
    <input id="employeeCode">

    <label>パスワード</label>
    <input type="password" id="employeePass">

    <button onclick="loginEmployee()">ログイン</button>
    <div id="errorEmployee" class="error"></div>
</div>

<script src="common.js"></script>
<script>
// ===============================
// タブ切り替え
// ===============================
function switchTab(type) {
    document.getElementById("tabCustomer").classList.remove("active");
    document.getElementById("tabEmployee").classList.remove("active");
    document.getElementById("panelCustomer").classList.remove("active");
    document.getElementById("panelEmployee").classList.remove("active");

    if (type === "customer") {
        document.getElementById("tabCustomer").classList.add("active");
        document.getElementById("panelCustomer").classList.add("active");
    } else {
        document.getElementById("tabEmployee").classList.add("active");
        document.getElementById("panelEmployee").classList.add("active");
    }
}

// ===============================
// 顧客ログイン
// ===============================
function loginCustomer() {
    const code = document.getElementById("customerCode").value.trim();
    const birth = document.getElementById("customerBirth").value;
    const error = document.getElementById("errorCustomer");

    error.textContent = "";

    const request = indexedDB.open("customersDB", 1);

    request.onsuccess = function(event) {
        const db = event.target.result;
        const tx = db.transaction("customers", "readonly");
        const store = tx.objectStore("customers");

        const getReq = store.get(code);

        getReq.onsuccess = function() {
            const user = getReq.result;

            if (!user || user.birth !== birth) {
                error.textContent = "顧客コードまたは生年月日が正しくありません。";
                return;
            }

            // ログイン情報を保存
            loginUser = {
                type: "customer",
                code: user.customerCode,
                name: user.name
            };
            sessionStorage.setItem("loginUser", JSON.stringify(loginUser));

            location.href = "mypage.html";
        };
    };
}

// ===============================
// 社員ログイン（簡易版）
// ===============================
function loginEmployee() {
    const code = document.getElementById("employeeCode").value.trim();
    const pass = document.getElementById("employeePass").value.trim();
    const error = document.getElementById("errorEmployee");

    error.textContent = "";

    // ★ 今は仮の固定ユーザー（後で employeesDB を作る）
    if (code === "EM-000001" && pass === "password") {
        loginUser = {
            type: "employee",
            code: code,
            name: "社員 太郎"
        };
        sessionStorage.setItem("loginUser", JSON.stringify(loginUser));

        location.href = "employees.html";
        return;
    }

    error.textContent = "社員コードまたはパスワードが正しくありません。";
}
</script>

</body>
</html>
