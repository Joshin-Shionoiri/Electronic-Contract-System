<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>契約状況管理</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        button { padding: 6px 12px; }
        iframe { width: 100%; height: 500px; margin-top: 20px; }
        #signCanvas { border: 1px solid #000; }
    </style>
</head>
<body>

<h2>契約状況管理</h2>

<table id="contractsTable">
    <tr>
        <th>顧客名</th>
        <th>顧客コード</th>
        <th>契約No.</th>
        <th>ステータス</th>
        <th>表示</th>
        <th>締結</th>
    </tr>
</table>

<h3>契約書プレビュー</h3>
<iframe id="pdfViewer"></iframe>

<div id="signArea" style="display:none;">
    <h3>手書き署名</h3>
    <canvas id="signCanvas" width="400" height="200"></canvas>
    <br>
    <button onclick="clearCanvas()">クリア</button>
    <button onclick="saveSignature()">署名して締結</button>
</div>

<script>
// ------------------------------
// データ読み込み
// ------------------------------
let contracts = JSON.parse(localStorage.getItem("contracts") || "[]");

// ------------------------------
// 契約一覧表示
// ------------------------------
function renderTable() {
    const table = document.getElementById("contractsTable");

    table.innerHTML = `
        <tr>
            <th>顧客名</th>
            <th>顧客コード</th>
            <th>契約No.</th>
            <th>ステータス</th>
            <th>表示</th>
            <th>締結</th>
        </tr>
    `;

    contracts.forEach((c, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${c.customerName}</td>
            <td>${c.customerCode}</td>
            <td>${c.contractNo}</td>
            <td>${c.status}</td>
            <td><button onclick="showPDF(${index})">表示</button></td>
            <td><button onclick="startSign(${index})">締結</button></td>
        `;

        table.appendChild(row);
    });
}

// ------------------------------
// PDF 表示
// ------------------------------
function showPDF(index) {
    const pdf = contracts[index].pdfData;
    document.getElementById("pdfViewer").src = pdf;
}

// ------------------------------
// 締結処理開始
// ------------------------------
let signingIndex = null;

function startSign(index) {
    signingIndex = index;

    // 手書き署名エリアを表示
    document.getElementById("signArea").style.display = "block";

    clearCanvas();
}

// ------------------------------
// Canvas 手書き署名
// ------------------------------
const canvas = document.getElementById("signCanvas");
const ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

function draw(e) {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ------------------------------
// 署名保存 → 締結
// ------------------------------
function saveSignature() {
    const signature = canvas.toDataURL("image/png");

    contracts[signingIndex].status = "締結済";
    contracts[signingIndex].signedAt = new Date().toISOString();
    contracts[signingIndex].signature = signature;

    localStorage.setItem("contracts", JSON.stringify(contracts));

    alert("契約を締結しました。");

    document.getElementById("signArea").style.display = "none";

    renderTable();
}

renderTable();
</script>

</body>
</html>
