<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>契約管理</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .step-bar {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-size: 15px;
            font-weight: 600;
        }
        .step {
            padding: 8px 14px;
            border-radius: 999px;
            background: #e0e7ff;
            color: #1d3a8a;
        }
        .step.active {
            background: #4f46e5;
            color: #fff;
        }
        .arrow {
            margin: 0 8px;
            color: #4f46e5;
            font-size: 18px;
        }
        .step-panel { display:none; }
        .step-panel.active { display:block; }
        .hint { font-size:12px; color:#6b7280; margin-top:4px; }
        .error { color:#b91c1c; font-size:12px; margin-top:6px; }
        .pdf-buttons button {
            margin-right: 6px;
            margin-top: 0;
            padding: 6px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div id="common-header"></div>
<script>
fetch("common-header.html").then(r=>r.text()).then(h=>document.getElementById("common-header").innerHTML=h);
</script>

<h2>契約管理</h2>

<div class="step-bar">
    <div class="step active" id="stepLabel1">1. 契約書番号</div>
    <div class="arrow">→</div>
    <div class="step" id="stepLabel2">2. 契約情報</div>
    <div class="arrow">→</div>
    <div class="step" id="stepLabel3">3. PDFアップロード</div>
    <div class="arrow">→</div>
    <div class="step" id="stepLabel4">4. 確認・登録</div>
</div>

<div class="card step-panel active" id="step1">
    <h3>① 契約書番号の入力 / バーコード読み取り</h3>
    <label>契約書番号</label>
    <input id="contractNumber" placeholder="契約書のバーコード下に印字されている番号">
    <div class="hint">新規契約の場合、契約書のバーコードを読み取るか、この番号を入力します。</div>
    <button onclick="startContractBarcode()">契約書バーコードを読み取る</button>
    <button onclick="goToStep(2)">次へ</button>
    <div id="errorStep1" class="error"></div>
</div>

<div class="card step-panel" id="step2">
    <h3>② 契約情報</h3>

    <div id="customerSelectArea">
        <label>顧客コード</label>
        <select id="customerCode"></select>
        <div class="hint">社員ログイン時のみ選択。顧客ログイン時は自動で自分の顧客コードになります。</div>
    </div>

    <label>契約開始日</label>
    <input type="date" id="startDate">

    <label>契約終了日</label>
    <input type="date" id="endDate">

    <label>プラン名</label>
    <input id="planName">

    <label>月額料金</label>
    <input id="price" type="number">

    <button class="btn-secondary" onclick="goToStep(1)">戻る</button>
    <button onclick="goToStep(3)">次へ</button>
    <div id="errorStep2" class="error"></div>
</div>

<div class="card step-panel" id="step3">
    <h3>③ 契約書PDFアップロード</h3>
    <label>契約書PDF</label>
    <input type="file" id="pdfFile" accept="application/pdf">
    <div class="hint">紙の契約書をスキャンしたPDFなどを登録します。</div>
    <button class="btn-secondary" onclick="goToStep(2)">戻る</button>
    <button onclick="goToStep(4)">次へ</button>
    <div id="errorStep3" class="error"></div>
</div>

<div class="card step-panel" id="step4">
    <h3>④ 確認・登録</h3>
    <div id="confirmArea"></div>
    <button class="btn-secondary" onclick="goToStep(3)">戻る</button>
    <button onclick="registerContract()">契約を登録</button>
    <div id="errorStep4" class="error"></div>
</div>

<div class="card">
    <h3>契約一覧（社員用）</h3>
    <table id="contractsTable">
        <tr>
            <th>契約書番号</th>
            <th>顧客コード</th>
            <th>プラン名</th>
            <th>PDF</th>
        </tr>
    </table>
</div>

<div class="footer">© JOSHIN SYSTEMS</div>

<script src="common.js"></script>
<script>
// ステップ制御
let currentStep = 1;
function updateStepLabels() {
    for (let i = 1; i <= 4; i++) {
        const label = document.getElementById("stepLabel" + i);
        label.classList.remove("active");
        if (i === currentStep) label.classList.add("active");
    }
}
function goToStep(step) {
    if (step === 2 && !validateStep1()) return;
    if (step === 3 && !validateStep2()) return;
    if (step === 4 && !validateStep3()) return;

    currentStep = step;
    updateStepLabels();
    for (let i = 1; i <= 4; i++) {
        document.getElementById("step" + i).classList.remove("active");
    }
    document.getElementById("step" + step).classList.add("active");
    if (step === 4) fillConfirm();
}

// バリデーション
function validateStep1() {
    const num = document.getElementById("contractNumber").value.trim();
    let msg = "";
    if (!num) msg = "契約書番号を入力してください。";
    document.getElementById("errorStep1").textContent = msg;
    return !msg;
}
function validateStep2() {
    const start = document.getElementById("startDate").value;
    const plan = document.getElementById("planName").value.trim();
    let msg = "";
    if (!start) msg += "契約開始日を入力してください。";
    if (!plan) msg += (msg ? " " : "") + "プラン名を入力してください。";
    document.getElementById("errorStep2").textContent = msg;
    return !msg;
}
function validateStep3() {
    const pdf = document.getElementById("pdfFile").files[0];
    let msg = "";
    if (!pdf) msg = "契約書PDFを選択してください。";
    document.getElementById("errorStep3").textContent = msg;
    return !msg;
}

// 確認
function fillConfirm() {
    const num = document.getElementById("contractNumber").value.trim();
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    const plan = document.getElementById("planName").value.trim();
    const price = document.getElementById("price").value;
    const customerCode = (loginUser.type === "customer")
        ? loginUser.code
        : document.getElementById("customerCode").value;

    document.getElementById("confirmArea").innerHTML = `
        <p><strong>契約書番号：</strong> ${num}</p>
        <p><strong>顧客コード：</strong> ${customerCode}</p>
        <p><strong>契約開始日：</strong> ${start}</p>
        <p><strong>契約終了日：</strong> ${end || "（未設定）"}</p>
        <p><strong>プラン名：</strong> ${plan}</p>
        <p><strong>月額料金：</strong> ${price ? price + " 円" : "（未設定）"}</p>
    `;
}

// 顧客選択（社員のみ）
const customers = JSON.parse(localStorage.getItem("customers") || "[]");
function loadCustomers() {
    if (loginUser.type === "customer") {
        document.getElementById("customerSelectArea").style.display = "none";
        return;
    }
    const sel = document.getElementById("customerCode");
    customers.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.customerCode;
        opt.textContent = `${c.customerCode} ${c.customerName}`;
        sel.appendChild(opt);
    });
}

// IndexedDB
let db;
const req = indexedDB.open("contractsDB", 1);
req.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("contracts", { keyPath: "contractNumber" });
};
req.onsuccess = e => {
    db = e.target.result;
    loadContracts();
};
req.onerror = () => alert("契約DB初期化に失敗しました。");

// 契約登録
function registerContract() {
    const num = document.getElementById("contractNumber").value.trim();
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    const plan = document.getElementById("planName").value.trim();
    const price = document.getElementById("price").value;
    const pdfFile = document.getElementById("pdfFile").files[0];
    const customerCode = (loginUser.type === "customer")
        ? loginUser.code
        : document.getElementById("customerCode").value;

    if (!num || !start || !plan || !pdfFile) {
        document.getElementById("errorStep4").textContent = "必要項目が不足しています。";
        return;
    }

    const reader = new FileReader();
    reader.onload = function() {
        const pdfData = reader.result;
        const tx = db.transaction("contracts", "readwrite");
        const store = tx.objectStore("contracts");
        store.put({
            contractNumber: num,
            customerCode,
            startDate: start,
            endDate: end,
            planName: plan,
            price,
            pdfData
        });
        tx.oncomplete = function() {
            document.getElementById("errorStep4").textContent = "";
            alert("契約を登録しました。");
            loadContracts();
        };
    };
    reader.readAsArrayBuffer(pdfFile);
}

// 契約一覧（社員用）
function loadContracts() {
    const table = document.getElementById("contractsTable");
    table.innerHTML = `
        <tr>
            <th>契約書番号</th>
            <th>顧客コード</th>
            <th>プラン名</th>
            <th>PDF</th>
        </tr>
    `;
    if (!db || loginUser.type !== "employee") return;
    const tx = db.transaction("contracts", "readonly");
    const store = tx.objectStore("contracts");
    store.openCursor().onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) {
            const c = cursor.value;
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${c.contractNumber}</td>
                <td>${c.customerCode}</td>
                <td>${c.planName}</td>
                <td class="pdf-buttons">
                    <button onclick="viewPDF('${c.contractNumber}')">閲覧</button>
                    <button onclick="printPDF('${c.contractNumber}')">印刷</button>
                </td>
            `;
            table.appendChild(row);
            cursor.continue();
        }
    };
}

// PDF閲覧・印刷
function viewPDF(num) {
    const tx = db.transaction("contracts", "readonly");
    const store = tx.objectStore("contracts");
    const g = store.get(num);
    g.onsuccess = function() {
        if (!g.result) { alert("PDFがありません。"); return; }
        const blob = new Blob([g.result.pdfData], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank");
    };
}
function printPDF(num) {
    const tx = db.transaction("contracts", "readonly");
    const store = tx.objectStore("contracts");
    const g = store.get(num);
    g.onsuccess = function() {
        if (!g.result) { alert("PDFがありません。"); return; }
        const blob = new Blob([g.result.pdfData], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const win = window.open(url, "_blank");
        win.onload = () => win.print();
    };
}

// 契約書バーコード読み取り（ダミー）
function startContractBarcode() {
    alert("ここで契約書バーコードをカメラで読み取る処理を実装（QuaggaJS 等）。\n読み取った番号を contractNumber にセットするイメージ。");
    // document.getElementById("contractNumber").value = "CN-20260320-0001";
}

// 初期処理
loadCustomers();
updateStepLabels();
</script>
</body>
</html>
