<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>
    <link rel="stylesheet" href="common.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background: #f1f5f9;
        }
        .status-ok {
            color: green;
            font-weight: bold;
        }
        .status-ng {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- 共通ヘッダー -->
<div id="common-header"></div>
<script>
fetch("common-header.html").then(r=>r.text()).then(h=>document.getElementById("common-header").innerHTML=h);
</script>

<h2>マイページ</h2>

<p>ようこそ、<span id="userName"></span> さん</p>

<div class="card">
    <h3>契約一覧</h3>

    <table id="contractTable">
        <thead>
            <tr>
                <th>契約書番号</th>
                <th>契約名</th>
                <th>期間</th>
                <th>金額</th>
                <th>署名状況</th>
                <th>PDF</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="common.js"></script>
<script>
// ===============================
// ページ読み込み時
// ===============================
window.onload = function() {
    if (!loginUser || loginUser.type !== "customer") {
        alert("顧客としてログインしてください。");
        location.href = "login.html";
        return;
    }

    document.getElementById("userName").textContent = loginUser.name;

    loadContracts();
};

// ===============================
// 契約一覧を読み込む
// ===============================
function loadContracts() {
    const request = indexedDB.open("contractsDB", 1);

    request.onsuccess = function(event) {
        const db = event.target.result;
        const tx = db.transaction("contracts", "readonly");
        const store = tx.objectStore("contracts");

        const tbody = document.querySelector("#contractTable tbody");
        tbody.innerHTML = "";

        store.openCursor().onsuccess = function(e) {
            const cursor = e.target.result;
            if (cursor) {
                const c = cursor.value;

                // ログイン中の顧客の契約だけ表示
                if (c.customerCode === loginUser.code) {
                    const tr = document.createElement("tr");

                    const signed = c.signature ? true : false;

                    tr.innerHTML = `
                        <td>${c.contractNumber}</td>
                        <td>${c.contractName}</td>
                        <td>${c.startDate} ～ ${c.endDate}</td>
                        <td>${c.price} 円</td>
                        <td class="${signed ? 'status-ok' : 'status-ng'}">
                            ${signed ? '署名済み' : '未署名'}
                        </td>
                        <td>
                            <button onclick="viewPDF('${c.contractNumber}')">PDF</button>
                        </td>
                        <td>
                            ${signed 
                                ? '-' 
                                : `<button onclick="goSign('${c.contractNumber}')">署名する</button>`
                            }
                        </td>
                    `;

                    tbody.appendChild(tr);
                }

                cursor.continue();
            }
        };
    };
}

// ===============================
// PDF閲覧
// ===============================
function viewPDF(contractNumber) {
    const request = indexedDB.open("contractsDB", 1);

    request.onsuccess = function(event) {
        const db = event.target.result;
        const tx = db.transaction("contracts", "readonly");
        const store = tx.objectStore("contracts");

        const getReq = store.get(contractNumber);

        getReq.onsuccess = function() {
            const contract = getReq.result;
            if (!contract || !contract.pdfData) {
                alert("PDFが登録されていません。");
                return;
            }

            const blob = new Blob([contract.pdfData], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            window.open(url, "_blank");
        };
    };
}

// ===============================
// 署名画面へ遷移
// ===============================
function goSign(contractNumber) {
    // 契約書番号をセッションに保存して contracts.html へ
    sessionStorage.setItem("signContractNumber", contractNumber);
    location.href = "contracts.html";
}
</script>

</body>
</html>
