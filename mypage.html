<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>

<div id="common-header"></div>
<script>
fetch("common-header.html").then(r=>r.text()).then(h=>document.getElementById("common-header").innerHTML=h);
</script>

<h2>マイページ</h2>

<div class="card">
    <h3>基本情報</h3>
    <label>名前</label>
    <input id="nameInput">
    <label>メールアドレス</label>
    <input id="emailInput">
    <label>電話番号</label>
    <input id="phoneInput">
    <button onclick="saveProfile()">保存</button>
</div>

<div class="card">
    <h3>パスワード変更</h3>
    <label>新しいパスワード</label>
    <input id="newPass" type="password">
    <button onclick="changePassword()">パスワードを変更</button>
</div>

<div class="card" id="customerContracts" style="display:none;">
    <h3>契約一覧</h3>
    <table id="contractsTable">
        <tr>
            <th>契約書番号</th>
            <th>プラン名</th>
            <th>PDF</th>
        </tr>
    </table>
</div>

<div class="card" id="employeeInfo" style="display:none;">
    <h3>権限情報</h3>
    <p>あなたは <strong>社員</strong> としてログインしています。</p>
    <p>全機能にアクセスできます。</p>
</div>

<div class="footer">© JOSHIN SYSTEMS</div>

<script src="common.js"></script>
<script>
// プロフィール初期表示
document.getElementById("nameInput").value = loginUser.name || "";
document.getElementById("emailInput").value = loginUser.email || "";
document.getElementById("phoneInput").value = loginUser.phone || "";

function saveProfile() {
    loginUser.name = document.getElementById("nameInput").value.trim();
    loginUser.email = document.getElementById("emailInput").value.trim();
    loginUser.phone = document.getElementById("phoneInput").value.trim();
    localStorage.setItem("loginUser", JSON.stringify(loginUser));
    alert("保存しました。");
    location.reload();
}

function changePassword() {
    const newPass = document.getElementById("newPass").value.trim();
    if (!newPass) {
        alert("パスワードを入力してください。");
        return;
    }
    if (loginUser.type === "employee") {
        const employees = JSON.parse(localStorage.getItem("employees") || "[]");
        const user = employees.find(e => e.employeeCode === loginUser.code);
        if (user) {
            user.password = newPass;
            localStorage.setItem("employees", JSON.stringify(employees));
        }
    }
    if (loginUser.type === "customer") {
        const customers = JSON.parse(localStorage.getItem("customers") || "[]");
        const user = customers.find(c => c.customerCode === loginUser.code);
        if (user) {
            user.password = newPass;
            localStorage.setItem("customers", JSON.stringify(customers));
        }
    }
    alert("パスワードを変更しました。");
}

// 顧客なら契約一覧
if (loginUser.type === "customer") {
    document.getElementById("customerContracts").style.display = "block";
    const table = document.getElementById("contractsTable");
    const req = indexedDB.open("contractsDB", 1);
    req.onsuccess = function(e) {
        const db = e.target.result;
        const tx = db.transaction("contracts", "readonly");
        const store = tx.objectStore("contracts");
        store.openCursor().onsuccess = function(ev) {
            const cursor = ev.target.result;
            if (cursor) {
                const c = cursor.value;
                if (c.customerCode === loginUser.code) {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${c.contractNumber}</td>
                        <td>${c.planName}</td>
                        <td><button onclick="viewPDF('${c.contractNumber}')">閲覧</button></td>
                    `;
                    table.appendChild(row);
                }
                cursor.continue();
            }
        };
    };
}

// 社員なら権限情報
if (loginUser.type === "employee") {
    document.getElementById("employeeInfo").style.display = "block";
}

// PDF閲覧
function viewPDF(contractNumber) {
    const req = indexedDB.open("contractsDB", 1);
    req.onsuccess = function(e) {
        const db = e.target.result;
        const tx = db.transaction("contracts", "readonly");
        const store = tx.objectStore("contracts");
        const g = store.get(contractNumber);
        g.onsuccess = function() {
            if (!g.result) {
                alert("PDFが登録されていません。");
                return;
            }
            const blob = new Blob([g.result.pdfData], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            window.open(url, "_blank");
        };
    };
}
</script>
</body>
</html>
